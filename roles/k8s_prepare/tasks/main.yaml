---

- name: Chrony 설치 
  dnf: 
    name: chrony
    state: present

- name: Chrony 서비스 시작
  service:
    name: chronyd
    state: started
    enabled: yes

- name: 시간 동기화 즉시 적용
  command: chronyc -a makestep


- name: Firewalld 방화벽 비활성화 (Rocky Linux)
  service:
    name: firewalld
    state: stopped
    enabled: no


- name: 현재 실행 중인 Swap 끄기
  command: swapoff -a
  when: ansible_swaptotal_mb > 0

- name: 재부팅 시에도 Swap이 켜지지 않도록 fstab에서 제거
  replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
    replace: '# \1'

- name: /etc/hosts 도메인 작성
  blockinfile:
    path: /etc/hosts
    block: |
      10.60.100.93 k8s-master
      10.60.100.94 k8s-worker1
      10.60.100.95 k8s-worker2


- name: 오버레이 및 브릿지 넷필터 모듈 로드
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: k8s용 sysctl 설정 파일 생성
  copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

- name: sysctl 설정 적용
  command: sysctl --system
