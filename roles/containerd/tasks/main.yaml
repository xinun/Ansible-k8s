- name: "dnf-plugins-core 설치"
  dnf:
    name: dnf-plugins-core
    state: present

- name: "Docker 저장소 추가"
  shell: dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo
  args:
    creates: /etc/yum.repos.d/docker-ce.repo

- name: containerd 설치 
  dnf:
    name: containerd.io
    state: present

- name: config.toml 설정
  shell: "containerd config default > /etc/containerd/config.toml"
  args:
    creates: /etc/containerd/config.toml

- name: "CRI 플러그인 활성화 (에러 해결 핵심!)"
  replace:
    path: /etc/containerd/config.toml
    regexp: 'disabled_plugins = \["cri"\]'
    replace: 'disabled_plugins = []'

- name: SystemdCgroup  true
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'

- name: containerd 서비스 시작
  service:
    name: containerd
    state: restarted
    enabled: yes
